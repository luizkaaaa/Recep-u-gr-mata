<!DOCTYPE html>
<html lang="lv">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Manas Receptes – Saldie</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --pink-deep:  #e8a0b0;
      --pink-mid:   #f2bec9;
      --pink-soft:  #fad4dc;
      --pink-light: #fde8ed;
      --pink-pale:  #fff4f6;
      --pink-card:  #fff9fa;
      --text-dark:  #4a2c35;
      --text-mid:   #7a4f5a;
      --text-light: #b07a88;
      --white:      #ffffff;
      --shadow:     0 4px 24px rgba(180,80,100,0.10);
      --radius:     18px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: linear-gradient(135deg, var(--pink-pale) 0%, var(--pink-light) 60%, var(--pink-soft) 100%);
      min-height: 100vh;
      color: var(--text-dark);
    }

    nav {
      background: rgba(255,255,255,0.75);
      backdrop-filter: blur(14px);
      border-bottom: 1.5px solid var(--pink-soft);
      padding: 0 2rem;
      position: sticky; top: 0; z-index: 100;
      display: flex; align-items: center; height: 64px;
    }
    .nav-brand {
      font-family: 'Playfair Display', serif;
      font-style: italic; font-size: 1.35rem;
      color: var(--pink-deep); margin-right: auto;
    }
    .nav-brand span { color: var(--text-dark); font-style: normal; }
    nav a {
      text-decoration: none; color: var(--text-mid);
      font-size: .88rem; font-weight: 500;
      padding: 0 1.1rem; height: 64px;
      display: flex; align-items: center;
      border-bottom: 3px solid transparent;
      transition: color .2s, border-color .2s;
      letter-spacing: .02em;
    }
    nav a:hover { color: var(--pink-deep); }
    nav a.active { color: var(--pink-deep); border-bottom-color: var(--pink-deep); }

    .page-header {
      text-align: center;
      padding: 3rem 1rem 1.5rem;
    }
    .page-header .pill {
      display: inline-block;
      background: var(--pink-soft); color: var(--text-mid);
      font-size: .78rem; letter-spacing: .1em;
      text-transform: uppercase; padding: .35rem 1.1rem;
      border-radius: 50px; margin-bottom: 1rem;
    }
    .page-header h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.8rem, 4vw, 2.6rem);
      color: var(--text-dark);
    }
    .page-header h1 em { color: var(--pink-deep); font-style: italic; }
    .page-header p { color: var(--text-light); font-size: .95rem; margin-top: .5rem; }

    .container { max-width: 900px; margin: 0 auto; padding: 0 1.5rem 4rem; }

    /* empty state */
    .empty-state {
      text-align: center;
      padding: 4rem 1rem;
      color: var(--text-light);
    }
    .empty-state .emoji { font-size: 3.5rem; margin-bottom: 1rem; }
    .empty-state h2 { font-family: 'Playfair Display', serif; font-size: 1.4rem; color: var(--text-mid); margin-bottom: .5rem; }
    .empty-state a {
      display: inline-block; margin-top: 1rem;
      background: linear-gradient(135deg, var(--pink-deep), var(--pink-mid));
      color: #fff; text-decoration: none;
      padding: .75rem 2rem; border-radius: 50px;
      font-weight: 500; font-size: .92rem;
      box-shadow: 0 4px 16px rgba(232,160,176,.35);
      transition: opacity .2s;
    }
    .empty-state a:hover { opacity: .85; }

    /* Recipe grid */
    .recipe-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(270px, 1fr));
      gap: 1.4rem;
    }

    .recipe-card {
      background: var(--pink-card);
      border: 1.5px solid var(--pink-soft);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 1.5rem 1.5rem 1.2rem;
      display: flex; flex-direction: column; gap: .75rem;
      transition: transform .2s, box-shadow .2s;
      animation: fadeUp .4s ease both;
    }
    .recipe-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 32px rgba(180,80,100,0.15);
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card-top { display: flex; justify-content: space-between; align-items: flex-start; gap: .5rem; }
    .recipe-name {
      font-family: 'Playfair Display', serif;
      font-size: 1.15rem; color: var(--text-dark); line-height: 1.3;
    }
    .recipe-date { font-size: .75rem; color: var(--text-light); white-space: nowrap; padding-top: .2rem; }

    .meta-row { display: flex; gap: .5rem; flex-wrap: wrap; }
    .badge {
      background: var(--pink-light);
      color: var(--text-mid);
      font-size: .75rem; font-weight: 500;
      padding: .25rem .7rem; border-radius: 50px;
    }

    .recipe-divider { height: 1px; background: var(--pink-soft); }

    .section-label {
      font-size: .72rem; font-weight: 500; letter-spacing: .08em;
      text-transform: uppercase; color: var(--text-light);
      margin-bottom: .3rem;
    }

    .ingredients-list {
      list-style: none;
      display: flex; flex-direction: column; gap: .2rem;
    }
    .ingredients-list li {
      font-size: .86rem; color: var(--text-mid);
      display: flex; gap: .4rem;
    }
    .ingredients-list li::before { content: '·'; color: var(--pink-deep); }
    .ing-amount { color: var(--text-dark); font-weight: 500; }

    .steps-text {
      font-size: .86rem; color: var(--text-mid);
      line-height: 1.65;
      white-space: pre-line;
      max-height: 120px; overflow-y: auto;
    }

    .notes-text {
      font-size: .82rem; color: var(--text-light);
      font-style: italic; line-height: 1.5;
    }

    .card-actions { display: flex; gap: .6rem; margin-top: .4rem; }
    .btn-edit {
      flex: 1; padding: .55rem;
      background: var(--pink-light); color: var(--pink-deep);
      border: 1.5px solid var(--pink-mid); border-radius: 10px;
      font-family: 'DM Sans', sans-serif; font-size: .83rem; font-weight: 500;
      cursor: pointer; transition: background .15s;
    }
    .btn-edit:hover { background: var(--pink-soft); }
    .btn-delete {
      flex: 1; padding: .55rem;
      background: transparent; color: #c0606e;
      border: 1.5px solid #fad4dc; border-radius: 10px;
      font-family: 'DM Sans', sans-serif; font-size: .83rem; font-weight: 500;
      cursor: pointer; transition: background .15s;
    }
    .btn-delete:hover { background: #fde8ed; }

    /* MODAL */
    .overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(74,44,53,.35); backdrop-filter: blur(4px);
      z-index: 300; align-items: center; justify-content: center;
    }
    .overlay.open { display: flex; }
    .modal {
      background: var(--pink-card); border-radius: var(--radius);
      padding: 2rem 2.2rem 1.8rem;
      width: min(640px, 95vw); max-height: 85vh; overflow-y: auto;
      box-shadow: 0 16px 60px rgba(180,80,100,.2);
      border: 1.5px solid var(--pink-soft);
    }
    .modal-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 1.4rem;
    }
    .modal-header h2 { font-family: 'Playfair Display', serif; font-size: 1.25rem; }
    .btn-icon {
      width: 34px; height: 34px; border: none; border-radius: 8px;
      background: var(--pink-soft); color: var(--text-mid); cursor: pointer;
      font-size: 1.1rem; display: flex; align-items: center; justify-content: center;
      transition: background .15s; flex-shrink: 0;
    }
    .btn-icon:hover { background: var(--pink-mid); }
    .btn-icon.danger { background: #fde8ed; color: #c0606e; }
    .btn-icon.danger:hover { background: #fad4dc; }

    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    .form-group { display: flex; flex-direction: column; gap: .45rem; }
    .form-group.full { grid-column: 1 / -1; }
    label { font-size: .8rem; font-weight: 500; color: var(--text-mid); letter-spacing: .04em; text-transform: uppercase; }
    input[type="text"], input[type="number"], select, textarea {
      width: 100%; padding: .7rem 1rem;
      border: 1.5px solid var(--pink-soft); border-radius: 10px;
      background: var(--white); color: var(--text-dark);
      font-family: 'DM Sans', sans-serif; font-size: .95rem; outline: none;
      transition: border-color .2s, box-shadow .2s;
    }
    input:focus, select:focus, textarea:focus {
      border-color: var(--pink-deep);
      box-shadow: 0 0 0 3px rgba(232,160,176,.18);
    }
    textarea { resize: vertical; min-height: 100px; line-height: 1.6; }
    .ingredient-list { display: flex; flex-direction: column; gap: .5rem; margin-bottom: .5rem; }
    .ingredient-row { display: flex; gap: .5rem; align-items: center; }
    .ingredient-row input { flex: 1; }
    .ingredient-row input.amount { flex: 0 0 90px; }
    .ingredient-row input.unit  { flex: 0 0 80px; }
    .modal-actions { display: flex; gap: .8rem; margin-top: 1.5rem; }
    .btn-primary {
      background: linear-gradient(135deg, var(--pink-deep), var(--pink-mid));
      color: #fff; border: none; border-radius: 12px;
      padding: .8rem 2rem; font-family: 'DM Sans', sans-serif;
      font-size: .95rem; font-weight: 500; cursor: pointer;
      box-shadow: 0 4px 16px rgba(232,160,176,.35);
      transition: opacity .2s;
    }
    .btn-primary:hover { opacity: .88; }
    .btn-outline {
      background: transparent; color: var(--pink-deep);
      border: 1.5px solid var(--pink-mid); border-radius: 10px;
      padding: .55rem 1.3rem; font-family: 'DM Sans', sans-serif;
      font-size: .88rem; font-weight: 500; cursor: pointer;
      transition: background .15s;
    }
    .btn-outline:hover { background: var(--pink-light); }

    /* confirm dialog */
    .confirm-box {
      display: none; position: fixed; inset: 0;
      background: rgba(74,44,53,.4); backdrop-filter: blur(4px);
      z-index: 400; align-items: center; justify-content: center;
    }
    .confirm-box.open { display: flex; }
    .confirm-inner {
      background: var(--pink-card); border-radius: var(--radius);
      padding: 2rem 2.2rem; text-align: center;
      width: min(360px, 92vw);
      box-shadow: 0 16px 60px rgba(180,80,100,.25);
      border: 1.5px solid var(--pink-soft);
    }
    .confirm-inner h3 { font-family: 'Playfair Display', serif; font-size: 1.2rem; margin-bottom: .6rem; }
    .confirm-inner p { font-size: .88rem; color: var(--text-light); margin-bottom: 1.4rem; }
    .confirm-btns { display: flex; gap: .8rem; justify-content: center; }
    .btn-danger {
      background: #e87080; color: #fff; border: none; border-radius: 10px;
      padding: .7rem 1.6rem; font-family: 'DM Sans', sans-serif;
      font-size: .9rem; font-weight: 500; cursor: pointer;
      transition: opacity .15s;
    }
    .btn-danger:hover { opacity: .85; }

    .toast {
      position: fixed; bottom: 2rem; left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--text-dark); color: #fff;
      padding: .75rem 1.8rem; border-radius: 50px;
      font-size: .9rem; font-weight: 500;
      opacity: 0; transition: all .35s cubic-bezier(.34,1.56,.64,1);
      z-index: 500; pointer-events: none;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-thumb { background: var(--pink-mid); border-radius: 3px; }

    @media (max-width: 600px) {
      nav a { padding: 0 .6rem; font-size: .8rem; }
      .nav-brand { font-size: 1.1rem; }
      .form-grid { grid-template-columns: 1fr; }
      .modal { padding: 1.5rem 1.2rem; }
    }
  </style>
</head>
<body>

<nav>
  <div class="nav-brand">🌸 <span>Recepšu Grāmata</span></div>
  <a href="index.html">✦ Pievienot</a>
  <a href="saldie.html" class="active">Saldie</a>
  <a href="snacks.html">Uzkodas</a>
  <a href="pamatfood.html">Pamatedieni</a>
</nav>

<div class="page-header">
  <div class="pill">🍰 Saldā kategorija</div>
  <h1>Saldie <em>ēdieni</em></h1>
  <p>Kūkas, tortes, desserti un viss, kas liek smaidīt</p>
</div>

<div class="container">
  <div id="recipeGrid" class="recipe-grid"></div>
  <div id="emptyState" class="empty-state" style="display:none">
    <div class="emoji">🍰</div>
    <h2>Vēl nav nevienas receptes</h2>
   <p>Pievieno savu pirmo saldo recepti!</p>
    <a href="index.html">+ Pievienot recepti</a>
  </div>
</div>

<!-- EDIT MODAL -->
<div class="overlay" id="editOverlay">
  <div class="modal">
    <div class="modal-header">
      <h2>✏️ Rediģēt recepti</h2>
      <button class="btn-icon" onclick="closeModal()">✕</button>
    </div>
    <div class="form-grid">
      <input type="hidden" id="editId"/>
      <div class="form-group full">
        <label>Nosaukums</label>
        <input type="text" id="editName"/>
      </div>
      <div class="form-group">
        <label>Laiks (min)</label>
        <input type="number" id="editTime"/>
      </div>
      <div class="form-group">
        <label>Porcijas</label>
        <input type="number" id="editServings"/>
      </div>
      <div class="form-group full">
        <label>Grūtības pakāpe</label>
        <select id="editDiff">
          <option value="">—</option>
          <option value="Viegla">🟢 Viegla</option>
          <option value="Vidēja">🟡 Vidēja</option>
          <option value="Grūta">🔴 Grūta</option>
        </select>
      </div>
      <div class="form-group full">
        <label>Sastāvdaļas</label>
        <div class="ingredient-list" id="editIngList"></div>
        <button type="button" class="btn-outline" style="width:fit-content;margin-top:.3rem" onclick="addEditIngredient()">+ Pievienot</button>
      </div>
      <div class="form-group full">
        <label>Soļi</label>
        <textarea id="editSteps"></textarea>
      </div>
      <div class="form-group full">
        <label>Piezīmes</label>
        <textarea id="editNotes" style="min-height:70px"></textarea>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn-primary" onclick="saveEdit()">💾 Saglabāt</button>
      <button class="btn-outline" onclick="closeModal()">Atcelt</button>
    </div>
  </div>
</div>

<!-- CONFIRM DELETE -->
<div class="confirm-box" id="confirmBox">
  <div class="confirm-inner">
    <h3>Dzēst recepti?</h3>
    <p>Šo darbību nevar atcelt.</p>
    <div class="confirm-btns">
      <button class="btn-danger" onclick="confirmDelete()">Dzēst</button>
      <button class="btn-outline" onclick="closeConfirm()">Atcelt</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  const STORAGE_KEY = 'saldie_receptes';
  let deleteTargetId = null;

  function load() {
    return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
  }
  function save(data) {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  }

  function render() {
    const data = load();
    const grid = document.getElementById('recipeGrid');
    const empty = document.getElementById('emptyState');
    grid.innerHTML = '';
    if (!data.length) { empty.style.display = ''; return; }
    empty.style.display = 'none';

    data.forEach((r, idx) => {
      const card = document.createElement('div');
      card.className = 'recipe-card';
      card.style.animationDelay = (idx * 0.06) + 's';

      const ings = (r.ingredients || []).map(i =>
        `<li><span class="ing-amount">${i.amount} ${i.unit}</span> ${i.name}</li>`
      ).join('');

      card.innerHTML = `
        <div class="card-top">
          <div class="recipe-name">${r.name}</div>
          <div class="recipe-date">${r.createdAt || ''}</div>
        </div>
        <div class="meta-row">
          ${r.time     ? `<span class="badge">⏱ ${r.time} min</span>` : ''}
          ${r.servings ? `<span class="badge">🍽 ${r.servings} porc.</span>` : ''}
          ${r.diff     ? `<span class="badge">${r.diff}</span>` : ''}
        </div>
        ${ings ? `<div class="recipe-divider"></div>
        <div>
          <div class="section-label">Sastāvdaļas</div>
          <ul class="ingredients-list">${ings}</ul>
        </div>` : ''}
        <div class="recipe-divider"></div>
        <div>
          <div class="section-label">Soļi</div>
          <div class="steps-text">${r.steps}</div>
        </div>
        ${r.notes ? `<div class="notes-text">💡 ${r.notes}</div>` : ''}
        <div class="card-actions">
          <button class="btn-edit" onclick="openEdit(${r.id})">✏️ Rediģēt</button>
          <button class="btn-delete" onclick="askDelete(${r.id})">🗑 Dzēst</button>
        </div>`;
      grid.appendChild(card);
    });
  }

  // ── Edit ──────────────────────────────────────────
  function openEdit(id) {
    const data = load();
    const r = data.find(x => x.id === id);
    if (!r) return;
    document.getElementById('editId').value = id;
    document.getElementById('editName').value    = r.name || '';
    document.getElementById('editTime').value    = r.time || '';
    document.getElementById('editServings').value= r.servings || '';
    document.getElementById('editDiff').value    = r.diff || '';
    document.getElementById('editSteps').value   = r.steps || '';
    document.getElementById('editNotes').value   = r.notes || '';

    const list = document.getElementById('editIngList');
    list.innerHTML = '';
    (r.ingredients || []).forEach(i => appendEditIngRow(i.amount, i.unit, i.name));
    if (!r.ingredients || !r.ingredients.length) appendEditIngRow('','','');

    document.getElementById('editOverlay').classList.add('open');
  }
  function appendEditIngRow(amount='', unit='', name='') {
    const list = document.getElementById('editIngList');
    const row = document.createElement('div');
    row.className = 'ingredient-row';
    row.innerHTML = `
      <input class="amount" type="text" placeholder="Daudzums" value="${amount}"/>
      <input class="unit"   type="text" placeholder="Mērvienība" value="${unit}"/>
      <input               type="text" placeholder="Sastāvdaļa" value="${name}"/>
      <button type="button" class="btn-icon danger" onclick="this.parentElement.remove()">✕</button>`;
    list.appendChild(row);
  }
  function addEditIngredient() { appendEditIngRow(); }

  function saveEdit() {
    const id = parseInt(document.getElementById('editId').value);
    const data = load();
    const idx = data.findIndex(x => x.id === id);
    if (idx === -1) return;

    const rows = document.querySelectorAll('#editIngList .ingredient-row');
    const ingredients = [];
    rows.forEach(r => {
      const inputs = r.querySelectorAll('input');
      const name = inputs[2].value.trim();
      if (name) ingredients.push({ amount: inputs[0].value.trim(), unit: inputs[1].value.trim(), name });
    });

    data[idx] = {
      ...data[idx],
      name:     document.getElementById('editName').value.trim(),
      time:     document.getElementById('editTime').value,
      servings: document.getElementById('editServings').value,
      diff:     document.getElementById('editDiff').value,
      steps:    document.getElementById('editSteps').value.trim(),
      notes:    document.getElementById('editNotes').value.trim(),
      ingredients
    };
    save(data);
    closeModal();
    render();
    showToast('✅ Izmaiņas saglabātas!');
  }
  function closeModal() {
    document.getElementById('editOverlay').classList.remove('open');
  }

  // ── Delete ────────────────────────────────────────
  function askDelete(id) {
    deleteTargetId = id;
    document.getElementById('confirmBox').classList.add('open');
  }
  function confirmDelete() {
    if (!deleteTargetId) return;
    const data = load().filter(x => x.id !== deleteTargetId);
    save(data);
    deleteTargetId = null;
    closeConfirm();
    render();
    showToast('🗑 Recepte izdzēsta');
  }
  function closeConfirm() {
    document.getElementById('confirmBox').classList.remove('open');
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2800);
  }

  // close overlay on bg click
  document.getElementById('editOverlay').addEventListener('click', function(e) {
    if (e.target === this) closeModal();
  });

  render();

  // live reload when returning from index
  window.addEventListener('focus', render);
</script>
</body>
</html>
