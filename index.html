<!DOCTYPE html>
<html lang="lv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Manas Receptes – Pievienot</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --pink-deep:   #e8a0b0;
      --pink-mid:    #f2bec9;
      --pink-soft:   #fad4dc;
      --pink-light:  #fde8ed;
      --pink-pale:   #fff4f6;
      --pink-card:   #fff9fa;
      --text-dark:   #4a2c35;
      --text-mid:    #7a4f5a;
      --text-light:  #b07a88;
      --white:       #ffffff;
      --shadow:      0 4px 24px rgba(180,80,100,0.10);
      --radius:      18px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: linear-gradient(135deg, var(--pink-pale) 0%, var(--pink-light) 60%, var(--pink-soft) 100%);
      min-height: 100vh;
      color: var(--text-dark);
    }

    nav {
      background: rgba(255,255,255,0.75);
      backdrop-filter: blur(14px);
      border-bottom: 1.5px solid var(--pink-soft);
      padding: 0 2rem;
      position: sticky;
      top: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      height: 64px;
    }
    .nav-brand {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: 1.35rem;
      color: var(--pink-deep);
      margin-right: auto;
    }
    .nav-brand span { color: var(--text-dark); font-style: normal; }
    nav a {
      text-decoration: none;
      color: var(--text-mid);
      font-size: 0.88rem;
      font-weight: 500;
      padding: 0 1.1rem;
      height: 64px;
      display: flex;
      align-items: center;
      border-bottom: 3px solid transparent;
      transition: color .2s, border-color .2s;
    }
    nav a:hover { color: var(--pink-deep); }
    nav a.active { color: var(--pink-deep); border-bottom-color: var(--pink-deep); }

    .hero { text-align: center; padding: 3.5rem 1rem 2rem; }
    .hero-pill {
      display: inline-block;
      background: var(--pink-soft);
      color: var(--text-mid);
      font-size: .78rem;
      letter-spacing: .1em;
      text-transform: uppercase;
      padding: .35rem 1.1rem;
      border-radius: 50px;
      margin-bottom: 1rem;
    }
    .hero h1 { font-family: 'Playfair Display', serif; font-size: clamp(2rem, 5vw, 3rem); color: var(--text-dark); }
    .hero h1 em { color: var(--pink-deep); font-style: italic; }
    .hero p { margin-top: .75rem; color: var(--text-light); font-size: .97rem; }

    .card {
      background: var(--pink-card);
      border: 1.5px solid var(--pink-soft);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      max-width: 680px;
      margin: 0 auto 3rem;
      padding: 2.5rem;
    }
    .card-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.3rem;
      color: var(--text-dark);
      margin-bottom: 1.6rem;
      display: flex; align-items: center; gap: .6rem;
    }
    .card-title::after { content: ''; flex: 1; height: 1px; background: var(--pink-soft); }

    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    .form-group { display: flex; flex-direction: column; gap: .45rem; }
    .form-group.full { grid-column: 1 / -1; }

    label { font-size: .8rem; font-weight: 500; color: var(--text-mid); text-transform: uppercase; }
    input, select, textarea {
      width: 100%; padding: .7rem 1rem;
      border: 1.5px solid var(--pink-soft);
      border-radius: 10px;
      font-family: inherit;
    }
    textarea { min-height: 110px; resize: vertical; }

    .ingredient-list { display: flex; flex-direction: column; gap: .5rem; margin-bottom: .5rem; }
    .ingredient-row { display: flex; gap: .5rem; align-items: center; }
    .ingredient-row input.amount { flex: 0 0 90px; }
    .ingredient-row input.unit { flex: 0 0 80px; }
    .ingredient-row input:last-of-type { flex: 1; }

    .btn-icon {
      width: 34px; height: 34px; border: none; border-radius: 8px;
      background: var(--pink-soft); color: var(--text-mid); cursor: pointer;
    }
    .btn-icon.danger { background: #fde8ed; color: #c0606e; }

    .btn-primary {
      background: linear-gradient(135deg, var(--pink-deep), var(--pink-mid));
      color: white; border: none; border-radius: 12px;
      padding: .85rem 2.2rem; font-weight: 500; cursor: pointer;
      box-shadow: 0 4px 16px rgba(232,160,176,0.35);
    }
    .btn-outline {
      background: transparent; color: var(--pink-deep);
      border: 1.5px solid var(--pink-mid); border-radius: 10px;
      padding: .55rem 1.1rem; cursor: pointer;
    }

    .form-actions { display: flex; gap: 1rem; margin-top: 1.6rem; }

    .toast {
      position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%) translateY(80px);
      background: var(--text-dark); color: white; padding: .75rem 1.8rem;
      border-radius: 50px; opacity: 0; transition: all .35s; z-index: 500;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    @media (max-width: 600px) { .form-grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>

<nav>
  <div class="nav-brand">🌸 <span>Recepšu Grāmata</span></div>
  <a href="index.html" class="active">✦ Pievienot</a>
  <a href="saldie.html">Saldie</a>
  <a href="snacks.html">Uzkodas</a>
  <a href="pamatfood.html">Pamatedieni</a>
</nav>

<div class="hero">
  <div class="hero-pill">Jauna recepte</div>
  <h1>Pievieno savu <em>recepti</em></h1>
  <p>Aizpildi formu un saglabā pie atbilstošās kategorijas</p>
</div>

<div class="card">
  <div class="card-title">🍴 Receptes informācija</div>
  <form id="recipeForm">
    <div class="form-grid">
      <div class="form-group full">
        <label>Receptes nosaukums *</label>
        <input type="text" id="recipeName" placeholder="piemēram, Šokolādes fondants" required/>
      </div>

      <div class="form-group">
        <label>Kategorija *</label>
        <select id="recipeCategory" required>
          <option value="">— Izvēlies —</option>
          <option value="saldie">🍰 Saldie ēdieni</option>
          <option value="snacks">🧀 Sāļās uzkodas</option>
          <option value="pamatfood">🍽️ Pamatedieni</option>
        </select>
      </div>

      <div class="form-group">
        <label>Gatavošanas laiks (min)</label>
        <input type="number" id="recipeTime" placeholder="45"/>
      </div>

      <div class="form-group full">
        <label>Sastāvdaļas</label>
        <div class="ingredient-list" id="ingredientList">
          <div class="ingredient-row">
            <input class="amount" type="text" placeholder="Daudzums"/>
            <input class="unit" type="text" placeholder="Mērvienība"/>
            <input type="text" placeholder="Sastāvdaļa"/>
            <button type="button" class="btn-icon danger" onclick="removeIngredient(this)">✕</button>
          </div>
        </div>
        <button type="button" class="btn-outline" onclick="addIngredient()">+ Pievienot sastāvdaļu</button>
      </div>

      <div class="form-group full">
        <label>Pagatavošanas soļi *</label>
        <textarea id="recipeSteps" placeholder="Apraksti pagatavošanu..." required></textarea>
      </div>

      <div class="form-group full">
        <label>Piezīmes</label>
        <textarea id="recipeNotes" style="min-height:70px"></textarea>
      </div>
    </div>

    <div class="form-actions">
      <button type="submit" class="btn-primary">🌸 Saglabāt recepti</button>
      <button type="button" class="btn-outline" onclick="resetForm()">Notīrīt</button>
    </div>
  </form>
</div>

<div class="toast" id="toast"></div>

<script>
  function addIngredient() {
    const list = document.getElementById('ingredientList');
    const row = document.createElement('div');
    row.className = 'ingredient-row';
    row.innerHTML = `
      <input class="amount" type="text" placeholder="Daudzums"/>
      <input class="unit" type="text" placeholder="Mērvienība"/>
      <input type="text" placeholder="Sastāvdaļa"/>
      <button type="button" class="btn-icon danger" onclick="removeIngredient(this)">✕</button>`;
    list.appendChild(row);
  }

  function removeIngredient(btn) {
    const list = document.getElementById('ingredientList');
    if (list.children.length > 1) btn.parentElement.remove();
  }

  function getIngredients() {
    const rows = document.querySelectorAll('.ingredient-row');
    const result = [];
    rows.forEach(r => {
      const inputs = r.querySelectorAll('input');
      const name = inputs[2].value.trim();
      if (name) {
        result.push({
          amount: inputs[0].value.trim(),
          unit: inputs[1].value.trim(),
          name: name
        });
      }
    });
    return result;
  }

  document.getElementById('recipeForm').addEventListener('submit', function(e) {
    e.preventDefault();
    
    const category = document.getElementById('recipeCategory').value;
    const name = document.getElementById('recipeName').value.trim();
    const steps = document.getElementById('recipeSteps').value.trim();

    if (!name || !category || !steps) return;

    const recipe = {
      id: Date.now(),
      name: name,
      time: document.getElementById('recipeTime').value,
      steps: steps,
      notes: document.getElementById('recipeNotes').value.trim(),
      ingredients: getIngredients(),
      createdAt: new Date().toLocaleDateString('lv-LV')
    };

    // IZLABOTĀ LOĢIKA: Precīzi nodalām katru kategoriju
    let key = '';
    if (category === 'pamatfood') {
      key = 'pamatfood_recipes';
    } else if (category === 'saldie') {
      key = 'saldie_receptes';
    } else if (category === 'snacks') {
      key = 'snacks_receptes';
    }

    const existing = JSON.parse(localStorage.getItem(key) || '[]');
    existing.unshift(recipe);
    localStorage.setItem(key, JSON.stringify(existing));

    showToast('✅ Saglabāts kategorijā: ' + category);
    
    setTimeout(() => {
      window.location.href = category === 'pamatfood' ? 'pamatfood.html' : category + '.html';
    }, 1200);

    resetForm();
  });

  function resetForm() {
    document.getElementById('recipeForm').reset();
    document.getElementById('ingredientList').innerHTML = `
      <div class="ingredient-row">
        <input class="amount" type="text" placeholder="Daudzums"/>
        <input class="unit" type="text" placeholder="Mērvienība"/>
        <input type="text" placeholder="Sastāvdaļa"/>
        <button type="button" class="btn-icon danger" onclick="removeIngredient(this)">✕</button>
      </div>`;
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2800);
  }
</script>
</body>
</html>
